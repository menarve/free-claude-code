<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menarve Code IA</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/assets/admin.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="mvCap" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#EDE9FE" />
                  <stop offset="1" stop-color="#C4B5FD" />
                </linearGradient>
                <linearGradient id="mvLeft" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#A78BFA" />
                  <stop offset="1" stop-color="#7C3AED" />
                </linearGradient>
                <linearGradient id="mvRight" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#7C3AED" />
                  <stop offset="1" stop-color="#5B21B6" />
                </linearGradient>
              </defs>
              <path d="M16 3 29 9 16 14 3 9Z" fill="url(#mvCap)" />
              <path d="M3 9 16 14 16 29Z" fill="url(#mvLeft)" />
              <path d="M29 9 16 14 16 29Z" fill="url(#mvRight)" />
            </svg>
          </div>
          <div>
            <h1>Menarve Code IA</h1>
          </div>
        </div>
        <nav id="sectionNav" class="section-nav" aria-label="Admin views"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="pageTitle">Providers</h2>
          </div>
        </header>

        <div id="adminViews" class="admin-views">
          <section id="view-providers" class="admin-view active" data-view="providers">
            <section class="provider-strip" aria-label="Provider status">
              <div class="strip-header">
                <h3>Providers</h3>
              </div>
              <div id="providerGrid" class="provider-grid"></div>
            </section>
            <div
              id="providersSections"
              class="form-sections"
              aria-label="Provider configuration"
            ></div>
          </section>

          <section id="view-model_config" class="admin-view" data-view="model_config" hidden>
            <div
              id="modelConfigSections"
              class="form-sections"
              aria-label="Model configuration"
            ></div>
          </section>

          <section id="view-messaging" class="admin-view" data-view="messaging" hidden>
            <div
              id="messagingSections"
              class="form-sections"
              aria-label="Messaging configuration"
            ></div>
          </section>

          <section id="view-usage" class="admin-view" data-view="usage" hidden>
            <div
              id="usageSections"
              class="form-sections"
              aria-label="Model usage statistics"
            ></div>
          </section>

          <section id="view-chat" class="admin-view" data-view="chat" hidden>
            <div class="chat-panel">
              <div id="chatMessages" class="chat-messages" aria-live="polite">
                <div class="chat-empty">
                  <div class="chat-empty-mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <defs>
                        <linearGradient id="chatCap" x1="0" y1="0" x2="1" y2="1">
                          <stop offset="0" stop-color="#EDE9FE" />
                          <stop offset="1" stop-color="#C4B5FD" />
                        </linearGradient>
                        <linearGradient id="chatLeft" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0" stop-color="#A78BFA" />
                          <stop offset="1" stop-color="#7C3AED" />
                        </linearGradient>
                        <linearGradient id="chatRight" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0" stop-color="#7C3AED" />
                          <stop offset="1" stop-color="#5B21B6" />
                        </linearGradient>
                      </defs>
                      <path d="M16 3 29 9 16 14 3 9Z" fill="url(#chatCap)" />
                      <path d="M3 9 16 14 16 29Z" fill="url(#chatLeft)" />
                      <path d="M29 9 16 14 16 29Z" fill="url(#chatRight)" />
                    </svg>
                  </div>
                  <h3>¿En qué puedo ayudarte?</h3>
                  <p>Escríbeme abajo para empezar. Puedo ayudarte con código, explicaciones, redacción e ideas.</p>
                </div>
              </div>
              <form id="chatForm" class="chat-composer">
                <textarea
                  id="chatInput"
                  class="chat-input"
                  rows="1"
                  placeholder="Escribe un mensaje…"
                  aria-label="Mensaje"
                ></textarea>
                <button id="chatSend" class="primary-button" type="submit">Enviar</button>
              </form>
            </div>
          </section>
        </div>
      </main>

      <footer class="action-bar">
        <div class="action-meta">
          <strong id="dirtyState">No changes</strong>
          <span id="configPath"></span>
        </div>
        <div id="messageArea" class="message-area"></div>
        <div class="action-buttons">
          <button id="validateButton" class="secondary-button" type="button">Validate</button>
          <button id="applyButton" class="primary-button" type="button" disabled>Apply</button>
        </div>
      </footer>
    </div>
    <script src="/admin/assets/admin.js"></script>
  </body>
</html>
